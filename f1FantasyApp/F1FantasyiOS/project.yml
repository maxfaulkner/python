name: F1Fantasy
options:
  bundleIdPrefix: com.maxfaulkner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.maxfaulkner.f1fantasy

targets:
  F1Fantasy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: F1Fantasy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maxfaulkner.f1fantasy
        INFOPLIST_FILE: F1Fantasy/Info.plist
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: F1Fantasy/F1Fantasy.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.maxfaulkner.f1fantasy